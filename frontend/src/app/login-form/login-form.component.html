<h2>Login</h2>

<form [formGroup]="userForm" (ngSubmit)="onSubmitLogin()">
    <div>
        <label for="loginName">Username: </label>
        <input type="login" id="loginName" name="login" formControlName="login" />
    </div>
    <div>
        <label for="passwordId">Password: </label>
        <input type="password" id="passwordId" name="password" formControlName="password" />
    </div>
    <button>Sign In</button>
</form>
